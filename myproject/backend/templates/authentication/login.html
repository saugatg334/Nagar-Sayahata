{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Credentials</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="{% static "css/authentication/login.css" %}">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

<div class="card shadow-sm p-4">

<div class="text-center mb-3">
<i class="fa-solid fa-user-shield fa-2x text-dark mb-2"></i>
<h4>Admin Setup</h4>
<p class="text-muted mb-0">Set username and password</p>
</div>

{% if messages %}
{% for msg in messages %}
<div class="alert alert-{{ msg.tags }} text-center py-2">
{{ msg }}
</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<!-- USERNAME -->
<div class="mb-3">
<label class="form-label">Username</label>
<div class="input-group">
<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>
<input type="text" name="username" class="form-control" placeholder="Enter username" required>
</div>
</div>

<!-- PASSWORD -->
<div class="mb-3">
<label class="form-label">Password</label>
<div class="input-group">
<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input type="password" id="password" name="password" class="form-control" required>

<span class="input-group-text eye-btn" onclick="togglePassword()">
<i id="eye" class="fa-solid fa-eye-slash"></i>
</span>
</div>
</div>

<button class="btn btn-dark w-100 mt-2">
Login
</button>

</form>

</div>

</div>

<script>
function togglePassword(){
    const input = document.getElementById("password");
    const icon = document.getElementById("eye");

    if(input.type === "password"){
        input.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }else{
        input.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }
}
</script>

</body>
</html>
